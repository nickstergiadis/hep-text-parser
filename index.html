<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEP Program Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card no-print">
      <h1>HEP Program Generator</h1>
      <p class="subtitle">
        Paste a home exercise program, generate a patient-ready handout, then print to PDF or open an email draft.
      </p>

      <div class="grid">
        <div>
          <label for="patientName">Patient name</label>
          <input id="patientName" type="text" placeholder="e.g. John Smith" />
        </div>

        <div>
          <label for="recipientEmail">Recipient email</label>
          <input id="recipientEmail" type="email" placeholder="e.g. patient@email.com" />
        </div>

        <div>
          <label for="programTitle">Program title</label>
          <input id="programTitle" type="text" value="Home Exercise Program" />
        </div>

        <div>
          <label for="programDate">Date</label>
          <input id="programDate" type="date" />
        </div>
      </div>

      <div class="field-block">
        <label for="introText">Intro / instructions</label>
        <textarea id="introText" rows="4" placeholder="General instructions for the patient">Perform the following exercises as prescribed. Stop and contact your physiotherapist if symptoms significantly worsen.</textarea>
      </div>

      <div class="field-block">
        <label for="inputText">Paste HEP text</label>
        <textarea id="inputText" rows="14" placeholder="Example:
1) Pelvic Tilts – 2 x 10, 3-second holds
2) Bridge – 3 x 8
3) Calf Stretch – 2 x 30s each side
4) Clamshell – 2 x 12 each side
Frequency: daily"></textarea>
      </div>

      <div class="button-row">
        <button id="sampleBtn" type="button">Load sample</button>
        <button id="generateBtn" type="button">Generate Program</button>
        <button id="printBtn" type="button">Download / Print PDF</button>
        <button id="emailBtn" type="button">Open Email Draft</button>
        <button id="copySummaryBtn" type="button">Copy Summary</button>
      </div>
    </section>

    <section id="programPreview" class="program-sheet">
      <div class="program-header">
        <div>
          <h2 id="previewTitle">Home Exercise Program</h2>
          <p id="previewPatient" class="muted">Patient: —</p>
          <p id="previewDate" class="muted">Date: —</p>
        </div>
      </div>

      <div class="intro-box">
        <p id="previewIntro">Perform the following exercises as prescribed.</p>
      </div>

      <div id="exerciseList" class="exercise-list">
        <p class="empty">Generate a program to see the patient-ready preview.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
