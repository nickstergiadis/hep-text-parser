name: Refresh video candidates

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: node scripts/refresh-video-candidates.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-candidate-artifacts
          path: |
            data/video_candidates.json
            data/video_rejections.json
            data/video_whitelist.json
